version: "1"
services:
  - type: web
    name: park4night-server
    runtime: node
    plan: free
    buildCommand: bash server/scripts/build.sh
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: static
          name: park4night-client
          property: url
      - key: SERVER_URL
        fromService:
          type: web
          name: park4night-server
          property: url

  - type: static
    name: park4night-client
    runtime: static
    buildCommand: npm install && cd client && npm install && npm run build
    publishDir: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: park4night-server
          property: url
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
