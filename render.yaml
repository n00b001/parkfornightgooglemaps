# Enable Preview Environments for every Pull Request
previews:
  generation: automatic

databases:
  - name: park4night-db
    databaseName: park4night
    user: park4night_user
    plan: free # Ensures the database starts on the free tier

services:
  # 1. Backend Web Service
  - type: web
    name: park4night-server
    runtime: node
    plan: free
    buildCommand: npm install && cd server && npm install && npx prisma generate
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: park4night-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://park4night-client.onrender.com

  # 2. Frontend Static Site
  - type: web
    name: park4night-client
    runtime: static
    buildCommand: npm install && cd client && npm install && npm run build
    staticPublishPath: client/dist # FIXED: Correct field name is staticPublishPath
    envVars:
      - key: VITE_API_URL
        value: https://park4night-server.onrender.com
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
