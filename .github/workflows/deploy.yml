name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent multiple deployments from running at the same time per PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: vsfbbzqiljbtcesremjn

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Build client
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        working-directory: client

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare (preview)
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          PR_ALIAS="pr-${{ github.event.pull_request.number }}"
          wrangler versions upload --preview-alias "$PR_ALIAS"
          echo "preview_url=https://${PR_ALIAS}-parking.xfanth.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ## 🚀 Preview Deployment

            **URL:** https://pr-${{ github.event.pull_request.number }}-parking.xfanth.workers.dev

            This preview is connected to the **production** Supabase backend.

      - name: Deploy to Cloudflare (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: wrangler deploy

      - name: Deploy Edge Functions (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: supabase functions deploy --project-ref $PROJECT_ID
