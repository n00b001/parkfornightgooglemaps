version: 1
databases:
  - name: park4night-db
    databaseName: park4night
    user: park4night_user
    plan: free

services:
  - type: web
    name: park4night-server
    runtime: node
    plan: free
    buildCommand: git lfs install && git lfs pull && npm install && cd server && npm install && npx prisma generate && npx prisma migrate deploy && node src/services/seedPlaces.js
    startCommand: cd server && npm start
    previewsEnabled: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: park4night-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: static
          name: park4night-client
          property: url
      - key: SERVER_URL
        fromService:
          type: web
          name: park4night-server
          property: url

  - type: static
    name: park4night-client
    buildCommand: npm install && cd client && npm install && npm run build
    publishDir: client/dist
    previewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: park4night-server
          property: url
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
